# Postgres + pgvector for the harness.
#   docker compose up -d
#   psql "$DATABASE_URL" -f schema.sql   (or: python -m harness.cli init-db)
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness
    ports:
      - "5433:5432"
    volumes:
      - harness_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  harness_pgdata:
