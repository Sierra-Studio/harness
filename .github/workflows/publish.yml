name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      # Publishing to a private, company-hosted index (GitHub Packages /
      # internal Artifactory) is the target state once several client repos
      # consume this — wire the actual publish step in when that index exists.
